<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文词云工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>中文词云工具</h1>
        <p class="subtitle">上传中文文本或直接输入，生成专属词云图</p>

        <!-- 输入方式切换 -->
        <div class="input-tabs">
            <button type="button" class="tab-btn active" id="tab-file">上传文件</button>
            <button type="button" class="tab-btn" id="tab-text">直接输入</button>
        </div>

        <!-- 文件上传区域 -->
        <div class="upload-area" id="panel-file">
            <form id="upload-form" enctype="multipart/form-data">
                <div class="file-select-zone" id="file-select-zone">
                    <input type="file" id="file-input" name="file" accept=".txt">
                    <div class="zone-icon">+</div>
                    <div class="zone-text">点击选择 .txt 文件</div>
                </div>
                <div class="file-preview" id="file-preview" style="display:none;">
                    <span class="preview-icon">📄</span>
                    <span class="preview-name" id="preview-name"></span>
                    <button type="button" class="preview-remove" id="preview-remove" title="移除文件">✕</button>
                </div>
                <button type="submit" id="upload-btn" class="btn-upload" disabled>上传文件</button>
            </form>
        </div>

        <!-- 直接输入文本区域 -->
        <div class="text-input-area" id="panel-text" style="display:none;">
            <textarea id="text-input" class="text-input" placeholder="请在此输入中文文本内容..." rows="6"></textarea>
            <div class="text-input-footer">
                <span class="char-count" id="char-count">0 字</span>
                <button type="button" id="text-submit-btn" class="btn-upload">开始分析</button>
            </div>
        </div>

        <div id="message" class="message"></div>

        <!-- 分词处理区域 -->
        <div id="process-area" class="process-area" style="display:none;">
            <p class="process-info">已上传文件：<strong id="uploaded-filename"></strong></p>
            <button id="process-btn" class="btn-process">开始分词分析</button>
        </div>

        <!-- 词频结果区域 -->
        <div id="result-area" class="result-area" style="display:none;">
            <div class="result-header">
                <h3>词频统计结果</h3>
                <div class="select-controls">
                    <button type="button" id="select-all-btn" class="btn-small">全选</button>
                    <button type="button" id="deselect-all-btn" class="btn-small">取消全选</button>
                </div>
            </div>
            <p class="result-hint">点击词语标签切换过滤状态，灰色划线 = 已过滤（不参与词云）</p>
            <div id="word-freq-list" class="word-freq-list"></div>
            <button type="button" id="filter-btn" class="btn-filter">确认过滤</button>
        </div>

        <!-- 词云生成区域 -->
        <div id="cloud-area" class="cloud-area" style="display:none;">
            <h3>生成词云</h3>
            <div class="cloud-params">
                <div class="param-row">
                    <label class="param-label" for="max-font">最大字号</label>
                    <input type="number" id="max-font" class="param-input" value="80" min="20" max="200">
                </div>
                <div class="param-row">
                    <label class="param-label" for="min-font">最小字号</label>
                    <input type="number" id="min-font" class="param-input" value="20" min="10" max="100">
                </div>
                <div class="param-row">
                    <label class="param-label" for="color-theme">颜色主题</label>
                    <select id="color-theme" class="param-select">
                        <option value="blue">蓝色</option>
                        <option value="green">绿色</option>
                        <option value="red">红色</option>
                        <option value="purple">紫色</option>
                        <option value="random">随机彩色</option>
                    </select>
                </div>
            </div>
            <button type="button" id="generate-btn" class="btn-generate">生成词云</button>
            <div id="cloud-result" class="cloud-result" style="display:none;">
                <img id="cloud-image" class="cloud-image" alt="词云图">
            </div>
        </div>

        <!-- 历史记录区域 -->
        <div id="history-area" class="history-area">
            <h3>历史记录</h3>
            <div id="history-list" class="history-list">
                <p class="history-empty">暂无历史记录</p>
            </div>
        </div>

        <!-- 数据管理区域 -->
        <div class="manage-area">
            <h3>数据管理</h3>
            <div id="storage-info" class="storage-info">加载中...</div>
            <div class="manage-actions">
                <button type="button" id="clean-uploads-btn" class="btn-manage">清理上传文件</button>
                <button type="button" id="clean-outputs-btn" class="btn-manage">清理词云图片</button>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="info-box">
            <h3>使用说明</h3>
            <ul>
                <li>支持上传 <strong>.txt</strong> 文件或直接输入文本</li>
                <li>点击词语标签切换过滤状态，灰色划线 = 已过滤</li>
                <li>调整词云参数后，点击"生成词云"</li>
                <li>生成成功后自动保存到历史记录</li>
            </ul>
        </div>
    </div>

    <script>
        var fileSelectZone = document.getElementById('file-select-zone');
        var fileInput = document.getElementById('file-input');
        var filePreview = document.getElementById('file-preview');
        var previewName = document.getElementById('preview-name');
        var previewRemove = document.getElementById('preview-remove');
        var uploadForm = document.getElementById('upload-form');
        var uploadBtn = document.getElementById('upload-btn');
        var messageBox = document.getElementById('message');
        var processArea = document.getElementById('process-area');
        var uploadedFilename = document.getElementById('uploaded-filename');
        var processBtn = document.getElementById('process-btn');
        var resultArea = document.getElementById('result-area');
        var wordFreqList = document.getElementById('word-freq-list');
        var selectAllBtn = document.getElementById('select-all-btn');
        var deselectAllBtn = document.getElementById('deselect-all-btn');
        var filterBtn = document.getElementById('filter-btn');
        var cloudArea = document.getElementById('cloud-area');
        var maxFontInput = document.getElementById('max-font');
        var minFontInput = document.getElementById('min-font');
        var colorThemeSelect = document.getElementById('color-theme');
        var generateBtn = document.getElementById('generate-btn');
        var cloudResult = document.getElementById('cloud-result');
        var cloudImage = document.getElementById('cloud-image');
        var historyList = document.getElementById('history-list');
        var textInput = document.getElementById('text-input');
        var charCount = document.getElementById('char-count');
        var textSubmitBtn = document.getElementById('text-submit-btn');
        var tabFile = document.getElementById('tab-file');
        var tabText = document.getElementById('tab-text');
        var panelFile = document.getElementById('panel-file');
        var panelText = document.getElementById('panel-text');
        var storageInfo = document.getElementById('storage-info');
        var cleanUploadsBtn = document.getElementById('clean-uploads-btn');
        var cleanOutputsBtn = document.getElementById('clean-outputs-btn');

        var currentFilename = '';
        var currentOriginalName = '';
        var currentSessionId = '';
        var currentWordFreq = {};
        var currentOriginalWordFreq = {};
        var currentRemovedWords = [];

        loadHistoryList();
        loadStorageInfo();

        // ========== 输入方式切换 ==========
        tabFile.addEventListener('click', function() {
            tabFile.classList.add('active');
            tabText.classList.remove('active');
            panelFile.style.display = '';
            panelText.style.display = 'none';
        });

        tabText.addEventListener('click', function() {
            tabText.classList.add('active');
            tabFile.classList.remove('active');
            panelText.style.display = '';
            panelFile.style.display = 'none';
        });

        // ========== 文本输入 ==========
        textInput.addEventListener('input', function() {
            charCount.textContent = textInput.value.length + ' 字';
        });

        textSubmitBtn.addEventListener('click', function() {
            var text = textInput.value.trim();
            if (!text) { showMessage('请输入文本内容', 'error'); return; }

            textSubmitBtn.disabled = true;
            textSubmitBtn.textContent = '分析中...';

            postJSON('/process_text_input', { text: text }, function(response) {
                textSubmitBtn.disabled = false;
                textSubmitBtn.textContent = '开始分析';
                if (response.status === 'success') {
                    showMessage('分词分析完成！', 'success');
                    currentSessionId = response.session_id;
                    currentWordFreq = response.word_freq;
                    currentOriginalWordFreq = response.original_word_freq || response.word_freq;
                    currentRemovedWords = response.removed_words || [];
                    currentOriginalName = '直接输入文本';
                    renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
                    cloudArea.style.display = 'block';
                    cloudResult.style.display = 'none';
                    processArea.style.display = 'none';
                } else {
                    showMessage(response.message, 'error');
                }
            });
        });

        // ========== 文件上传 ==========
        fileSelectZone.addEventListener('click', function() { fileInput.click(); });

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                previewName.textContent = fileInput.files[0].name;
                filePreview.style.display = 'flex';
                fileSelectZone.style.display = 'none';
                uploadBtn.disabled = false;
            } else { resetFileSelect(); }
        });

        previewRemove.addEventListener('click', function() { resetFileSelect(); });

        function resetFileSelect() {
            fileInput.value = '';
            previewName.textContent = '';
            filePreview.style.display = 'none';
            fileSelectZone.style.display = 'flex';
            uploadBtn.disabled = true;
        }

        uploadForm.addEventListener('submit', function(event) {
            event.preventDefault();
            if (fileInput.files.length === 0) { showMessage('请先选择文件', 'error'); return; }
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';

            var formData = new FormData();
            formData.append('file', fileInput.files[0]);
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload_txt', true);
            xhr.onload = function() {
                uploadBtn.textContent = '上传文件';
                if (xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    if (response.status === 'success') {
                        showMessage(response.message, 'success');
                        currentFilename = response.filename;
                        currentOriginalName = response.original_name || response.filename;
                        uploadedFilename.textContent = currentOriginalName;
                        processArea.style.display = 'block';
                        resultArea.style.display = 'none';
                        cloudArea.style.display = 'none';
                        resetFileSelect();
                    } else { showMessage(response.message, 'error'); uploadBtn.disabled = false; }
                } else { showMessage('服务器错误', 'error'); uploadBtn.disabled = false; }
            };
            xhr.onerror = function() { uploadBtn.textContent = '上传文件'; uploadBtn.disabled = false; showMessage('网络错误', 'error'); };
            xhr.send(formData);
        });

        // ========== 分词分析 ==========
        processBtn.addEventListener('click', function() {
            if (!currentFilename) { showMessage('请先上传文件', 'error'); return; }
            processBtn.disabled = true;
            processBtn.textContent = '分析中...';
            postJSON('/process_text', { filename: currentFilename }, function(response) {
                processBtn.disabled = false;
                processBtn.textContent = '开始分词分析';
                if (response.status === 'success') {
                    showMessage('分词分析完成！', 'success');
                    currentSessionId = response.session_id;
                    currentWordFreq = response.word_freq;
                    currentOriginalWordFreq = response.original_word_freq || response.word_freq;
                    currentRemovedWords = response.removed_words || [];
                    renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
                    cloudArea.style.display = 'block';
                    cloudResult.style.display = 'none';
                } else { showMessage(response.message, 'error'); }
            });
        });

        // ========== 全选/取消全选 ==========
        selectAllBtn.addEventListener('click', function() {
            currentRemovedWords = Object.keys(currentOriginalWordFreq);
            renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
        });

        deselectAllBtn.addEventListener('click', function() {
            currentRemovedWords = [];
            renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
        });

        // ========== 确认过滤 ==========
        filterBtn.addEventListener('click', function() {
            filterBtn.disabled = true;
            filterBtn.textContent = '过滤中...';
            postJSON('/filter_words', { session_id: currentSessionId, remove_words: currentRemovedWords }, function(response) {
                filterBtn.disabled = false;
                filterBtn.textContent = '确认过滤';
                if (response.status === 'success') {
                    if (currentRemovedWords.length === 0) {
                        showMessage('已取消所有过滤，所有词将参与词云生成', 'success');
                    } else {
                        showMessage('过滤完成！已标记 ' + currentRemovedWords.length + ' 个词', 'success');
                    }
                    currentWordFreq = response.word_freq;
                    currentOriginalWordFreq = response.original_word_freq || currentOriginalWordFreq;
                    currentRemovedWords = response.removed_words || currentRemovedWords;
                    renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
                } else { showMessage(response.message, 'error'); }
            });
        });

        // ========== 生成词云 ==========
        generateBtn.addEventListener('click', function() {
            if (!currentSessionId) { showMessage('请先进行分词分析', 'error'); return; }
            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';
            var params = {
                session_id: currentSessionId,
                max_font_size: parseInt(maxFontInput.value) || 80,
                min_font_size: parseInt(minFontInput.value) || 20,
                color_theme: colorThemeSelect.value
            };
            postJSON('/generate_wordcloud', params, function(response) {
                generateBtn.disabled = false;
                generateBtn.textContent = '生成词云';
                if (response.status === 'success') {
                    showMessage('词云生成成功！', 'success');
                    cloudImage.src = response.image_url + '?t=' + Date.now();
                    cloudResult.style.display = 'block';
                    saveCurrentHistory(params);
                } else { showMessage(response.message, 'error'); }
            });
        });

        function saveCurrentHistory(params) {
            postJSON('/save_history', {
                word_freq: currentWordFreq,
                params: { max_font_size: params.max_font_size, min_font_size: params.min_font_size, color_theme: params.color_theme },
                filename: currentOriginalName || currentFilename
            }, function(response) { if (response.status === 'success') loadHistoryList(); });
        }

        // ========== 渲染词频列表（按钮标签式） ==========
        function renderWordFreq(originalWordFreq, removedWords) {
            wordFreqList.innerHTML = '';
            var items = Object.entries(originalWordFreq).sort(function(a, b) { return b[1] - a[1]; });
            if (items.length === 0) {
                wordFreqList.innerHTML = '<p class="empty-hint">所有词已被过滤</p>';
                resultArea.style.display = 'block';
                return;
            }
            var removedSet = new Set(removedWords || []);
            for (var i = 0; i < items.length; i++) {
                var word = items[i][0];
                var freq = items[i][1];
                var isRemoved = removedSet.has(word);

                var tag = document.createElement('button');
                tag.type = 'button';
                tag.className = 'word-tag' + (isRemoved ? ' removed' : '');
                tag.setAttribute('data-word', word);
                tag.innerHTML = word + ' <span class="tag-count">' + freq + '</span>';

                tag.addEventListener('click', (function(w) {
                    return function() { toggleWord(w); };
                })(word));

                wordFreqList.appendChild(tag);
            }
            resultArea.style.display = 'block';
        }

        function toggleWord(word) {
            var idx = currentRemovedWords.indexOf(word);
            if (idx === -1) {
                currentRemovedWords.push(word);
            } else {
                currentRemovedWords.splice(idx, 1);
            }
            renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
        }

        // ========== 历史记录 ==========
        function loadHistoryList() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/history_list', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    if (response.status === 'success') renderHistoryList(response.history);
                }
            };
            xhr.send();
        }

        function renderHistoryList(history) {
            historyList.innerHTML = '';
            if (history.length === 0) { historyList.innerHTML = '<p class="history-empty">暂无历史记录</p>'; return; }
            for (var i = 0; i < history.length; i++) {
                var record = history[i];
                var item = document.createElement('div');
                item.className = 'history-item';
                var info = document.createElement('div');
                info.className = 'history-info';
                var timeEl = document.createElement('div');
                timeEl.className = 'history-time';
                timeEl.textContent = record.time;
                var nameEl = document.createElement('div');
                nameEl.className = 'history-name';
                nameEl.textContent = record.filename || '未知文件';
                var topWords = Object.entries(record.word_freq || {}).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 3).map(function(w) { return w[0] + '(' + w[1] + ')'; }).join('、');
                var freqEl = document.createElement('div');
                freqEl.className = 'history-freq';
                freqEl.textContent = topWords || '无词频数据';
                info.appendChild(timeEl);
                info.appendChild(nameEl);
                info.appendChild(freqEl);
                var actions = document.createElement('div');
                actions.className = 'history-actions';
                var regenBtn = document.createElement('button');
                regenBtn.className = 'btn-regen';
                regenBtn.textContent = '重新生成';
                regenBtn.setAttribute('data-id', record.id);
                var delBtn = document.createElement('button');
                delBtn.className = 'btn-del';
                delBtn.textContent = '删除';
                delBtn.setAttribute('data-id', record.id);
                actions.appendChild(regenBtn);
                actions.appendChild(delBtn);
                item.appendChild(info);
                item.appendChild(actions);
                historyList.appendChild(item);
            }
            historyList.querySelectorAll('.btn-regen').forEach(function(btn) {
                btn.addEventListener('click', function() { regenerateFromHistory(this.getAttribute('data-id')); });
            });
            historyList.querySelectorAll('.btn-del').forEach(function(btn) {
                btn.addEventListener('click', function() { deleteHistoryRecord(this.getAttribute('data-id')); });
            });
        }

        function regenerateFromHistory(recordId) {
            postJSON('/load_history', { id: recordId }, function(response) {
                if (response.status === 'success') {
                    var params = response.params || {};
                    var wordFreq = response.word_freq || {};
                    currentWordFreq = wordFreq;
                    currentOriginalWordFreq = dict(wordFreq);
                    currentRemovedWords = [];
                    renderWordFreq(currentOriginalWordFreq, currentRemovedWords);
                    cloudArea.style.display = 'block';
                    cloudResult.style.display = 'none';
                    maxFontInput.value = params.max_font_size || 80;
                    minFontInput.value = params.min_font_size || 20;
                    colorThemeSelect.value = params.color_theme || 'blue';
                    postJSON('/cache_word_freq', { word_freq: wordFreq }, function(resp) {
                        if (resp.status === 'success') {
                            currentSessionId = resp.session_id;
                            showMessage('历史记录已加载，点击"生成词云"', 'success');
                        }
                    });
                } else { showMessage(response.message, 'error'); }
            });
        }

        function dict(obj) { var o = {}; for (var k in obj) { if (obj.hasOwnProperty(k)) o[k] = obj[k]; } return o; }

        function deleteHistoryRecord(recordId) {
            if (!confirm('确定删除这条历史记录吗？')) return;
            postJSON('/delete_history', { id: recordId }, function(response) {
                if (response.status === 'success') { showMessage('已删除', 'success'); loadHistoryList(); }
                else { showMessage(response.message, 'error'); }
            });
        }

        // ========== 数据管理 ==========
        function loadStorageInfo() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/storage_info', true);
            xhr.onload = function() {
                if (xhr.status === 200) {
                    var r = JSON.parse(xhr.responseText);
                    if (r.status === 'success') {
                        storageInfo.innerHTML = '上传文件: <strong>' + r.uploads.files + '</strong> 个 (' + r.uploads.size_kb + ' KB) &nbsp;&nbsp; 词云图片: <strong>' + r.outputs.files + '</strong> 个 (' + r.outputs.size_kb + ' KB)';
                    }
                }
            };
            xhr.send();
        }

        cleanUploadsBtn.addEventListener('click', function() {
            if (!confirm('确定清理所有上传的文本文件吗？此操作不可恢复。')) return;
            postJSON('/clean_uploads', {}, function(response) {
                if (response.status === 'success') {
                    showMessage('已清理 ' + response.deleted + ' 个文件，释放 ' + response.freed_kb + ' KB', 'success');
                    loadStorageInfo();
                }
            });
        });

        cleanOutputsBtn.addEventListener('click', function() {
            if (!confirm('确定清理所有词云图片吗？此操作不可恢复。')) return;
            postJSON('/clean_outputs', {}, function(response) {
                if (response.status === 'success') {
                    showMessage('已清理 ' + response.deleted + ' 个文件，释放 ' + response.freed_kb + ' KB', 'success');
                    loadStorageInfo();
                    cloudResult.style.display = 'none';
                }
            });
        });

        // ========== 工具函数 ==========
        function postJSON(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                if (xhr.status === 200) callback(JSON.parse(xhr.responseText));
                else callback({ status: 'error', message: '服务器错误' });
            };
            xhr.onerror = function() { callback({ status: 'error', message: '网络错误' }); };
            xhr.send(JSON.stringify(data));
        }

        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
            setTimeout(function() { messageBox.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
