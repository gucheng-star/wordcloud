<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文词云工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>中文词云工具</h1>
        <p class="subtitle">上传中文文本，生成专属词云图</p>

        <!-- 文件上传区域 -->
        <div class="upload-area">
            <form id="upload-form" enctype="multipart/form-data">
                <div class="file-select-zone" id="file-select-zone">
                    <input type="file" id="file-input" name="file" accept=".txt">
                    <div class="zone-icon">+</div>
                    <div class="zone-text">点击选择 .txt 文件</div>
                </div>
                <div class="file-preview" id="file-preview" style="display:none;">
                    <span class="preview-icon">📄</span>
                    <span class="preview-name" id="preview-name"></span>
                    <button type="button" class="preview-remove" id="preview-remove" title="移除文件">✕</button>
                </div>
                <button type="submit" id="upload-btn" class="btn-upload" disabled>上传文件</button>
            </form>
        </div>

        <div id="message" class="message"></div>

        <!-- 分词处理区域 -->
        <div id="process-area" class="process-area" style="display:none;">
            <p class="process-info">已上传文件：<strong id="uploaded-filename"></strong></p>
            <button id="process-btn" class="btn-process">开始分词分析</button>
        </div>

        <!-- 词频结果区域 -->
        <div id="result-area" class="result-area" style="display:none;">
            <div class="result-header">
                <h3>词频统计结果</h3>
                <div class="select-controls">
                    <button type="button" id="select-all-btn" class="btn-small">全选</button>
                    <button type="button" id="deselect-all-btn" class="btn-small">取消全选</button>
                </div>
            </div>
            <p class="result-hint">勾选不需要进入词云的词，然后点击"确认过滤"</p>
            <div id="word-freq-list" class="word-freq-list"></div>
            <button type="button" id="filter-btn" class="btn-filter">确认过滤</button>
        </div>

        <!-- 词云生成区域 -->
        <div id="cloud-area" class="cloud-area" style="display:none;">
            <h3>生成词云</h3>
            <div class="cloud-params">
                <div class="param-row">
                    <label class="param-label" for="max-font">最大字号</label>
                    <input type="number" id="max-font" class="param-input" value="80" min="20" max="200">
                </div>
                <div class="param-row">
                    <label class="param-label" for="min-font">最小字号</label>
                    <input type="number" id="min-font" class="param-input" value="20" min="10" max="100">
                </div>
                <div class="param-row">
                    <label class="param-label" for="color-theme">颜色主题</label>
                    <select id="color-theme" class="param-select">
                        <option value="blue">蓝色</option>
                        <option value="green">绿色</option>
                        <option value="red">红色</option>
                        <option value="purple">紫色</option>
                        <option value="random">随机彩色</option>
                    </select>
                </div>
            </div>
            <button type="button" id="generate-btn" class="btn-generate">生成词云</button>
            <div id="cloud-result" class="cloud-result" style="display:none;">
                <img id="cloud-image" class="cloud-image" alt="词云图">
            </div>
        </div>

        <!-- 历史记录区域 -->
        <div id="history-area" class="history-area">
            <h3>历史记录</h3>
            <div id="history-list" class="history-list">
                <p class="history-empty">暂无历史记录</p>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="info-box">
            <h3>使用说明</h3>
            <ul>
                <li>上传 <strong>.txt</strong> 格式的中文文本文件</li>
                <li>点击"开始分词分析"查看词频统计</li>
                <li>勾选不需要的词，点击"确认过滤"移除</li>
                <li>调整词云参数后，点击"生成词云"</li>
                <li>生成成功后自动保存到历史记录</li>
                <li>可从历史记录中重新生成词云</li>
            </ul>
        </div>
    </div>

    <script>
        var fileSelectZone = document.getElementById('file-select-zone');
        var fileInput = document.getElementById('file-input');
        var filePreview = document.getElementById('file-preview');
        var previewName = document.getElementById('preview-name');
        var previewRemove = document.getElementById('preview-remove');
        var uploadForm = document.getElementById('upload-form');
        var uploadBtn = document.getElementById('upload-btn');
        var messageBox = document.getElementById('message');
        var processArea = document.getElementById('process-area');
        var uploadedFilename = document.getElementById('uploaded-filename');
        var processBtn = document.getElementById('process-btn');
        var resultArea = document.getElementById('result-area');
        var wordFreqList = document.getElementById('word-freq-list');
        var selectAllBtn = document.getElementById('select-all-btn');
        var deselectAllBtn = document.getElementById('deselect-all-btn');
        var filterBtn = document.getElementById('filter-btn');
        var cloudArea = document.getElementById('cloud-area');
        var maxFontInput = document.getElementById('max-font');
        var minFontInput = document.getElementById('min-font');
        var colorThemeSelect = document.getElementById('color-theme');
        var generateBtn = document.getElementById('generate-btn');
        var cloudResult = document.getElementById('cloud-result');
        var cloudImage = document.getElementById('cloud-image');
        var historyList = document.getElementById('history-list');

        var currentFilename = '';
        var currentOriginalName = '';
        var currentSessionId = '';
        var currentWordFreq = {};

        // 页面加载时获取历史记录
        loadHistoryList();

        // 文件选择交互
        fileSelectZone.addEventListener('click', function() { fileInput.click(); });

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                previewName.textContent = fileInput.files[0].name;
                filePreview.style.display = 'flex';
                fileSelectZone.style.display = 'none';
                uploadBtn.disabled = false;
            } else {
                resetFileSelect();
            }
        });

        previewRemove.addEventListener('click', function() { resetFileSelect(); });

        function resetFileSelect() {
            fileInput.value = '';
            previewName.textContent = '';
            filePreview.style.display = 'none';
            fileSelectZone.style.display = 'flex';
            uploadBtn.disabled = true;
        }

        // 上传文件
        uploadForm.addEventListener('submit', function(event) {
            event.preventDefault();
            if (fileInput.files.length === 0) { showMessage('请先选择一个文件', 'error'); return; }

            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';

            var formData = new FormData();
            formData.append('file', fileInput.files[0]);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/upload_txt', true);

            xhr.onload = function() {
                uploadBtn.textContent = '上传文件';
                if (xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    if (response.status === 'success') {
                        showMessage(response.message, 'success');
                        currentFilename = response.filename;
                        currentOriginalName = response.original_name || response.filename;
                        uploadedFilename.textContent = currentOriginalName;
                        processArea.style.display = 'block';
                        resultArea.style.display = 'none';
                        cloudArea.style.display = 'none';
                        resetFileSelect();
                    } else {
                        showMessage(response.message, 'error');
                        uploadBtn.disabled = false;
                    }
                } else {
                    showMessage('服务器错误', 'error');
                    uploadBtn.disabled = false;
                }
            };

            xhr.onerror = function() {
                uploadBtn.textContent = '上传文件';
                uploadBtn.disabled = false;
                showMessage('网络错误', 'error');
            };

            xhr.send(formData);
        });

        // 分词分析
        processBtn.addEventListener('click', function() {
            if (!currentFilename) { showMessage('请先上传文件', 'error'); return; }

            processBtn.disabled = true;
            processBtn.textContent = '分析中...';

            postJSON('/process_text', { filename: currentFilename }, function(response) {
                processBtn.disabled = false;
                processBtn.textContent = '开始分词分析';
                if (response.status === 'success') {
                    showMessage('分词分析完成！', 'success');
                    currentSessionId = response.session_id;
                    currentWordFreq = response.word_freq;
                    renderWordFreq(response.word_freq);
                    cloudArea.style.display = 'block';
                    cloudResult.style.display = 'none';
                } else {
                    showMessage(response.message, 'error');
                }
            });
        });

        // 全选 / 取消全选
        selectAllBtn.addEventListener('click', function() {
            var cbs = wordFreqList.querySelectorAll('input[type="checkbox"]');
            for (var i = 0; i < cbs.length; i++) { cbs[i].checked = true; }
        });

        deselectAllBtn.addEventListener('click', function() {
            var cbs = wordFreqList.querySelectorAll('input[type="checkbox"]');
            for (var i = 0; i < cbs.length; i++) { cbs[i].checked = false; }
        });

        // 确认过滤
        filterBtn.addEventListener('click', function() {
            var removeWords = [];
            var cbs = wordFreqList.querySelectorAll('input[type="checkbox"]:checked');
            for (var i = 0; i < cbs.length; i++) { removeWords.push(cbs[i].value); }

            if (removeWords.length === 0) { showMessage('请先勾选需要过滤的词', 'error'); return; }

            filterBtn.disabled = true;
            filterBtn.textContent = '过滤中...';

            postJSON('/filter_words', { session_id: currentSessionId, remove_words: removeWords }, function(response) {
                filterBtn.disabled = false;
                filterBtn.textContent = '确认过滤';
                if (response.status === 'success') {
                    showMessage('过滤完成！已移除 ' + removeWords.length + ' 个词', 'success');
                    currentWordFreq = response.word_freq;
                    renderWordFreq(response.word_freq);
                } else {
                    showMessage(response.message, 'error');
                }
            });
        });

        // 生成词云
        generateBtn.addEventListener('click', function() {
            if (!currentSessionId) { showMessage('请先进行分词分析', 'error'); return; }

            generateBtn.disabled = true;
            generateBtn.textContent = '生成中...';

            var params = {
                session_id: currentSessionId,
                max_font_size: parseInt(maxFontInput.value) || 80,
                min_font_size: parseInt(minFontInput.value) || 20,
                color_theme: colorThemeSelect.value
            };

            postJSON('/generate_wordcloud', params, function(response) {
                generateBtn.disabled = false;
                generateBtn.textContent = '生成词云';
                if (response.status === 'success') {
                    showMessage('词云生成成功！', 'success');
                    cloudImage.src = response.image_url + '?t=' + Date.now();
                    cloudResult.style.display = 'block';
                    // 生成成功后自动保存历史记录
                    saveCurrentHistory(params);
                } else {
                    showMessage(response.message, 'error');
                }
            });
        });

        // 保存当前词云到历史记录
        function saveCurrentHistory(params) {
            postJSON('/save_history', {
                word_freq: currentWordFreq,
                params: {
                    max_font_size: params.max_font_size,
                    min_font_size: params.min_font_size,
                    color_theme: params.color_theme
                },
                filename: currentOriginalName || currentFilename
            }, function(response) {
                if (response.status === 'success') {
                    loadHistoryList();
                }
            });
        }

        // ========== 历史记录功能 ==========

        // 加载历史记录列表
        function loadHistoryList() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/history_list', true);

            xhr.onload = function() {
                if (xhr.status === 200) {
                    var response = JSON.parse(xhr.responseText);
                    if (response.status === 'success') {
                        renderHistoryList(response.history);
                    }
                }
            };

            xhr.send();
        }

        // 渲染历史记录列表
        function renderHistoryList(history) {
            historyList.innerHTML = '';

            if (history.length === 0) {
                historyList.innerHTML = '<p class="history-empty">暂无历史记录</p>';
                return;
            }

            for (var i = 0; i < history.length; i++) {
                var record = history[i];
                var item = document.createElement('div');
                item.className = 'history-item';

                // 左侧信息
                var info = document.createElement('div');
                info.className = 'history-info';

                var timeEl = document.createElement('div');
                timeEl.className = 'history-time';
                timeEl.textContent = record.time;

                var nameEl = document.createElement('div');
                nameEl.className = 'history-name';
                nameEl.textContent = record.filename || '未知文件';

                // 简要词频：显示前3个词
                var topWords = Object.entries(record.word_freq || {})
                    .sort(function(a, b) { return b[1] - a[1]; })
                    .slice(0, 3)
                    .map(function(w) { return w[0] + '(' + w[1] + ')'; })
                    .join('、');

                var freqEl = document.createElement('div');
                freqEl.className = 'history-freq';
                freqEl.textContent = topWords || '无词频数据';

                info.appendChild(timeEl);
                info.appendChild(nameEl);
                info.appendChild(freqEl);

                // 右侧按钮
                var actions = document.createElement('div');
                actions.className = 'history-actions';

                var regenBtn = document.createElement('button');
                regenBtn.className = 'btn-regen';
                regenBtn.textContent = '重新生成';
                regenBtn.setAttribute('data-id', record.id);

                var delBtn = document.createElement('button');
                delBtn.className = 'btn-del';
                delBtn.textContent = '删除';
                delBtn.setAttribute('data-id', record.id);

                actions.appendChild(regenBtn);
                actions.appendChild(delBtn);

                item.appendChild(info);
                item.appendChild(actions);
                historyList.appendChild(item);
            }

            // 绑定按钮事件
            historyList.querySelectorAll('.btn-regen').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    regenerateFromHistory(this.getAttribute('data-id'));
                });
            });

            historyList.querySelectorAll('.btn-del').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    deleteHistoryRecord(this.getAttribute('data-id'));
                });
            });
        }

        // 从历史记录重新生成词云
        function regenerateFromHistory(recordId) {
            postJSON('/load_history', { id: recordId }, function(response) {
                if (response.status === 'success') {
                    // 将历史词频写入缓存（通过 session_id 机制）
                    // 先用历史词频和参数生成词云
                    var params = response.params || {};
                    var wordFreq = response.word_freq || {};

                    // 生成一个临时 session_id，把词频写入缓存
                    postJSON('/process_text', { filename: '__history__' }, function() {});

                    // 直接用历史词频生成词云
                    // 需要先把词频存入缓存：使用一个特殊方式
                    // 通过 filter_words 的反向逻辑不行，直接在 generate_wordcloud 中处理
                    // 最简方案：把历史词频加载到当前会话
                    currentWordFreq = wordFreq;
                    currentSessionId = '';

                    // 渲染词频列表
                    renderWordFreq(wordFreq);
                    cloudArea.style.display = 'block';

                    // 设置参数
                    maxFontInput.value = params.max_font_size || 80;
                    minFontInput.value = params.min_font_size || 20;
                    colorThemeSelect.value = params.color_theme || 'blue';

                    // 因为没有 session_id，需要先创建一个
                    // 使用历史词频创建新 session
                    createSessionFromHistory(wordFreq, params);
                } else {
                    showMessage(response.message, 'error');
                }
            });
        }

        // 用历史词频创建新的 session 并生成词云
        function createSessionFromHistory(wordFreq, params) {
            // 通过 /process_text 无法直接传入词频
            // 改用策略：直接调用 generate_wordcloud，但需要 session_id
            // 最简方案：把历史词频存入 filter_words 的缓存中
            // 实际方案：新增一个接口太重，改用前端直接展示词频+提示用户重新上传
            // 更好的方案：利用 process_text 的 session 缓存机制
            // → 先上传原文件再分词太麻烦
            // → 最简方案：在 generate_wordcloud 中支持直接传 word_freq

            // 实际最简方案：使用一个特殊的 session_id 存入缓存
            var tempSessionId = 'hist_' + Date.now();

            // 直接调用后端把词频写入缓存
            // 但我们没有这样的接口...改用 filter_words 的 trick：
            // 先创建一个空 session（通过 process_text），然后替换词频

            // 最终方案：直接在前端提示用户点击"生成词云"按钮
            // 因为词频已经加载到 currentWordFreq，但需要 session_id
            // → 我们需要一个小接口来把词频写入缓存

            // 最简实现：复用 /save_history 的模式，新增一个 /cache_word_freq 接口
            // 但这违反"不破坏现有逻辑"原则

            // 实际可行方案：利用现有的 filter_words 接口
            // 1. 先 process_text 任意文件获得 session_id
            // 2. 然后用 filter_words 替换词频

            // 但我们没有任意文件可以 process...

            // 最终最简方案：在 app.py 中加一个轻量接口 /cache_word_freq
            // 这是最干净的方案，只做一件事：把词频写入缓存返回 session_id

            postJSON('/cache_word_freq', { word_freq: wordFreq }, function(response) {
                if (response.status === 'success') {
                    currentSessionId = response.session_id;
                    currentWordFreq = wordFreq;
                    showMessage('历史记录已加载，点击"生成词云"', 'success');
                } else {
                    showMessage('加载失败：' + response.message, 'error');
                }
            });
        }

        // 删除历史记录
        function deleteHistoryRecord(recordId) {
            if (!confirm('确定删除这条历史记录吗？')) return;

            postJSON('/delete_history', { id: recordId }, function(response) {
                if (response.status === 'success') {
                    showMessage('已删除', 'success');
                    loadHistoryList();
                } else {
                    showMessage(response.message, 'error');
                }
            });
        }

        // ========== 通用工具函数 ==========

        // 封装 POST JSON 请求
        function postJSON(url, data, callback) {
            var xhr = new XMLHttpRequest();
            xhr.open('POST', url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onload = function() {
                if (xhr.status === 200) {
                    callback(JSON.parse(xhr.responseText));
                } else {
                    callback({ status: 'error', message: '服务器错误' });
                }
            };

            xhr.onerror = function() {
                callback({ status: 'error', message: '网络错误' });
            };

            xhr.send(JSON.stringify(data));
        }

        // 渲染词频列表
        function renderWordFreq(wordFreq) {
            wordFreqList.innerHTML = '';
            var items = Object.entries(wordFreq).sort(function(a, b) { return b[1] - a[1]; });

            if (items.length === 0) {
                wordFreqList.innerHTML = '<p class="empty-hint">所有词已被过滤</p>';
                resultArea.style.display = 'block';
                return;
            }

            var maxFreq = items[0][1];

            for (var i = 0; i < items.length; i++) {
                var word = items[i][0];
                var freq = items[i][1];

                var item = document.createElement('div');
                item.className = 'freq-item';

                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.className = 'freq-checkbox';
                checkbox.value = word;
                checkbox.id = 'cb-' + i;

                var label = document.createElement('label');
                label.className = 'freq-word';
                label.textContent = word;
                label.setAttribute('for', 'cb-' + i);

                var bar = document.createElement('div');
                bar.className = 'freq-bar';
                bar.style.width = Math.max(freq / maxFreq * 100, 5) + '%';

                var count = document.createElement('span');
                count.className = 'freq-count';
                count.textContent = freq;

                item.appendChild(checkbox);
                item.appendChild(label);
                item.appendChild(bar);
                item.appendChild(count);
                wordFreqList.appendChild(item);
            }

            resultArea.style.display = 'block';
        }

        // 提示消息
        function showMessage(text, type) {
            messageBox.textContent = text;
            messageBox.className = 'message ' + type;
            messageBox.style.display = 'block';
            setTimeout(function() { messageBox.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
